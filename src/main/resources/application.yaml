server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    ollama:
      base-url: http://host.docker.internal:11434
      embedding:
        base-url: http://host.docker.internal:11434
        options:
          model: nomic-embed-text
      chat:
        base-url: https://ollama.com
        api-key: ${OLLAMA_API_KEY}
        options:
          model: glm-4.7:cloud
          temperature: 0.2

    vectorstore:
      qdrant:
        host: qdrant
        port: 6334
        collection-name: rag-documents
        initialize-schema: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rag:
  chunk-size: 1000
  chunk-overlap: 200
  search:
    top-k: 5
    similarity-threshold: 0.7
  web-search:
    enabled: false
    min-documents: 1
    results-limit: 3

searxng:
  base-url: http://searxng:8080

logging:
  level:
    org.springframework.ai: DEBUG