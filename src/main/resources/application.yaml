server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    ollama:
      base-url: http://ollama:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.2
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      qdrant:
        host: qdrant
        port: 6334
        collection-name: rag-documents
        initialize-schema: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rag:
  chunk-size: 1000
  chunk-overlap: 200
  search:
    top-k: 5
    similarity-threshold: 0.7


logging:
  level:
    org.springframework.ai: DEBUG