server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    ollama:
      base-url: https://ollama.com
      api-key: ${OLLAMA_API_KEY}
      chat:
        options:
          model: glm-4.7
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      qdrant:
        host: qdrant
        port: 6333
        collection-name: rag-documents

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rag:
  chunk-size: 1000
  chunk-overlap: 200
  search:
    top-k: 5
    similarity-threshold: 0.7