use_default_settings: true

server:
  secret_key: "your-secret-key"
  public_instance: false
  limiter: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ru"
  formats:
    - html
    - json

ui:
  default_locale: "ru"
  default_theme: "simple"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0

categories_as_tabs:
  general:
    - general
    - news
    - it